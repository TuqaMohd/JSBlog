<!DOCTYPE html>
<html lang="en" class="scroll-behavior-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
     <style>
        html{
            scroll-behavior: smooth;
        }
     </style>
</head>
<body class="bg-pink-100 text-rose-950 font-sans min-h-screen flex flex-col antialiased">
    <header class="w-full bg-white border-b border-neutral-100 sticky top-0 z-40 shadow-xs">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-4">
<body class="bg-slate-950 p-8 flex items-center justify-center min-h-screen">
 
        
        <a href="#" class="flex items-center gap-2.5 select-none">
          <div class="h-10 w-10 rounded-xl bg-gradient-to-tr from-rose-600 to-rose-500 flex items-center justify-center text-white shadow-md shadow-rose-600/10 border border-rose-400/35 cursor-pointer hover:rotate-2 transition-transform">
          </div>
          <div class="flex flex-col cursor-pointer">
            <span class="text-xl tracking-tight text-rose-400 leading-none font-bold">
              Tuqa's <span class="text-rose-300 font-extrabold">Blog</span>
            </span>
            <span class="text-[10px] uppercase tracking-wider font-extrabold text-rose-600 font-mono mt-2 leading-none">
              Welcome to my Blog :D
            </span>
          </div>
        </a>
                <!-- Search bar design-->
        <div class="hidden md:flex flex-1 max-w-lg relative group">
          <span class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-neutral-400 transition-colors group-focus-within:text-rose-600">
            <i data-lucide="search" class="h-4 w-4"></i>
          </span>
          <input
            id="search-input"
            type="text"
            class="w-full bg-neutral-55 hover:bg-neutral-100/70 text-neutral-800 rounded-xl border border-neutral-100 pl-6 pr-20 py-2.5 text-sm placeholder-neutral-400 focus:bg-white focus:border-rose-500 focus:ring-4 focus:ring-rose-50 focus:outline-none transition-all duration-200"
            placeholder="Type to travel elsewhere...."
          />
          <span class="absolute right-2 top-2 px-3 py-1 text-[10px] font-bold uppercase tracking-wider bg-rose-50 text-rose-700 rounded-lg pointer-events-none font-mono">
            Search
          </span>
        </div>  
        </body>  
        <button onclick="window.location.href='index.html'">Go to Home Page</button>
